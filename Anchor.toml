[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
pact_protocol = "CoiQFqwmZU6KYq6BjMMz3yw9sgb5L8ngusPgtRXGRHi8"

[programs.devnet]
pact_protocol = "CoiQFqwmZU6KYq6BjMMz3yw9sgb5L8ngusPgtRXGRHi8"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 15000

[test.validator]
bind_address = "127.0.0.1"
gossip_port = 18000

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
